<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HabitBoard</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;background:#090909;color:#fff;font-family:Arial;padding:20px}
.top{display:flex;gap:10px}
.card{flex:1;border:1px solid #9cff00;border-radius:16px;padding:16px}
.habit{display:flex;justify-content:space-between;align-items:center;background:#111;border-radius:16px;padding:16px;margin:12px 0}
.dot{width:24px;height:24px;border-radius:50%;background:#9cff00;cursor:pointer}
nav{position:fixed;bottom:0;left:0;right:0;background:#111;padding:16px;display:flex;justify-content:space-around}
button{background:#9cff00;border:none;padding:10px 16px;border-radius:12px}
</style>
</head>
<body>
<h1>HabitBoard</h1>
<div class='top'>
<div class='card'><small>STREAK</small><h2>14 DAYS</h2></div>
<div class='card'><small>DONE TODAY</small><h2 id='count'>0/3</h2></div>
</div>
<h3>Habits</h3>
<div id='habits'></div>
<button onclick='addHabit()'>+ New Habit</button>
<nav><span>Today</span><span>Progress</span><span>Settings</span></nav>
<script>
let habits=JSON.parse(localStorage.getItem('habits')||'["Exercise","Meditate","Read 30 Min"]');
let state=JSON.parse(localStorage.getItem('state')||'{}');
function save(){localStorage.setItem('habits',JSON.stringify(habits));localStorage.setItem('state',JSON.stringify(state))}
function render(){
let h=document.getElementById('habits');h.innerHTML='';
let done=0;
habits.forEach(x=>{
if(state[x]) done++;
let d=document.createElement('div');
d.className='habit';
d.innerHTML=`<span>${x}</span><div class='dot' style='background:${state[x]?'#9cff00':'#333'}'></div>`;
d.onclick=()=>{state[x]=!state[x];save();render();};
h.appendChild(d);
});
document.getElementById('count').innerText=`${done}/${habits.length}`;
}
function addHabit(){
let n=prompt('Habit name');
if(n){habits.push(n);save();render();}
}
render();
</script>
</body></html>
